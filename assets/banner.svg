<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 340" role="img" aria-label="gh-backdate — write anything onto the GitHub contribution graph, at any point in time">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f1a"/>
      <stop offset="0.55" stop-color="#101a2e"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e8b84a"/>
      <stop offset="1" stop-color="#f5d67b"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0e4429"/>
      <stop offset="0.4" stop-color="#006d32"/>
      <stop offset="0.7" stop-color="#26a641"/>
      <stop offset="1" stop-color="#39d353"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="340" fill="url(#bg)"/>

  <!-- contribution-cell field, faint background texture -->
  <g opacity="0.13" fill="#39d353">
    <g transform="translate(40,26)">
      <rect x="0" y="0" width="10" height="10" rx="2"/><rect x="14" y="14" width="10" height="10" rx="2"/>
      <rect x="28" y="0" width="10" height="10" rx="2"/><rect x="42" y="28" width="10" height="10" rx="2"/>
      <rect x="56" y="14" width="10" height="10" rx="2"/><rect x="70" y="42" width="10" height="10" rx="2"/>
      <rect x="1130" y="230" width="10" height="10" rx="2"/><rect x="1144" y="244" width="10" height="10" rx="2"/>
      <rect x="1158" y="230" width="10" height="10" rx="2"/><rect x="1172" y="258" width="10" height="10" rx="2"/>
      <rect x="1116" y="258" width="10" height="10" rx="2"/><rect x="1144" y="272" width="10" height="10" rx="2"/>
    </g>
  </g>

  <!-- HI painted in contribution cells: the project in one glyph -->
  <g transform="translate(88,96)">
    <g>
      <!-- H -->
      <rect x="0"  y="0"  width="16" height="16" rx="3.5" fill="#39d353"/>
      <rect x="0"  y="21" width="16" height="16" rx="3.5" fill="#26a641"/>
      <rect x="0"  y="42" width="16" height="16" rx="3.5" fill="#39d353"/>
      <rect x="0"  y="63" width="16" height="16" rx="3.5" fill="#26a641"/>
      <rect x="0"  y="84" width="16" height="16" rx="3.5" fill="#39d353"/>
      <rect x="21" y="42" width="16" height="16" rx="3.5" fill="#006d32"/>
      <rect x="42" y="0"  width="16" height="16" rx="3.5" fill="#26a641"/>
      <rect x="42" y="21" width="16" height="16" rx="3.5" fill="#39d353"/>
      <rect x="42" y="42" width="16" height="16" rx="3.5" fill="#26a641"/>
      <rect x="42" y="63" width="16" height="16" rx="3.5" fill="#39d353"/>
      <rect x="42" y="84" width="16" height="16" rx="3.5" fill="#26a641"/>
      <!-- I -->
      <rect x="84" y="0"  width="16" height="16" rx="3.5" fill="#39d353"/>
      <rect x="84" y="21" width="16" height="16" rx="3.5" fill="#26a641"/>
      <rect x="84" y="42" width="16" height="16" rx="3.5" fill="#39d353"/>
      <rect x="84" y="63" width="16" height="16" rx="3.5" fill="#26a641"/>
      <rect x="84" y="84" width="16" height="16" rx="3.5" fill="#39d353"/>
      <!-- shadow cells -->
      <rect x="21" y="63" width="16" height="16" rx="3.5" fill="#0e4429"/>
      <rect x="63" y="21" width="16" height="16" rx="3.5" fill="#0e4429"/>
      <rect x="105" y="21" width="16" height="16" rx="3.5" fill="#0e4429"/>
      <rect x="105" y="63" width="16" height="16" rx="3.5" fill="#0e4429"/>
    </g>
  </g>

  <!-- timeline rule with year ticks: the "any window" promise -->
  <g stroke="#2c3a52" stroke-width="2">
    <line x1="90" y1="258" x2="1190" y2="258"/>
  </g>
  <g fill="#8b949e" font-family="Verdana, Geneva, sans-serif" font-size="13">
    <text x="90"   y="280">2014</text>
    <text x="330"  y="280">2017</text>
    <text x="560"  y="280">2020</text>
    <text x="790"  y="280">2023</text>
    <text x="1020" y="280">2026</text>
    <text x="1120" y="280" fill="#e8b84a">future →</text>
  </g>
  <g fill="url(#green)">
    <rect x="88"  y="248" width="380" height="6" rx="3"/>
  </g>
  <g fill="#39d353" opacity="0.85">
    <rect x="500" y="245" width="12" height="12" rx="3"/>
    <rect x="740" y="245" width="12" height="12" rx="3"/>
    <rect x="980" y="245" width="12" height="12" rx="3"/>
    <rect x="1160" y="245" width="12" height="12" rx="3" opacity="0.5"/>
  </g>

  <!-- title block -->
  <g font-family="Georgia, 'Times New Roman', serif">
    <text x="270" y="150" font-size="76" fill="url(#gold)" font-weight="bold">gh-backdate</text>
    <text x="274" y="196" font-size="25" fill="#c9d1d9" font-style="italic">your contribution graph is a 53×7 display — this is its device driver</text>
  </g>
  <g font-family="Verdana, Geneva, sans-serif" font-size="15" fill="#8b949e">
    <text x="274" y="228">PIXEL FONTS + REAL TTFs · 4-TIER SHADING · SHADOWS · 10-YEAR SCROLL GIF · BACKDATED &amp; FUTURE-DATED COMMITS</text>
  </g>
  <rect x="274" y="238" width="240" height="3" fill="url(#gold)" rx="1.5"/>
</svg>
